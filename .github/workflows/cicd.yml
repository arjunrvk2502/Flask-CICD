name: CICD pileline for Flask App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: action/setup-python@v4
        with:
          python-version: 3.10

      - name: build
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask:latest .

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: push image to docker hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flask:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: deploy to GCP VM
        uses: appleboy/ssh-actions@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/flask:latest
            docker stop flask || true
            docker rm flask || true
            docker run -d --name flask -p 80:5000 ${{ secrets.DOCKER_USERNAME }}/flask:latest